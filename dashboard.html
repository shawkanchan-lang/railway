<!DOCTYPE html>
<html>
<head>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">
<h2>Book Train</h2>
<form method="POST">
<select name="train" class="form-control">
<option>Rajdhani Express</option>
<option>Shatabdi Express</option>
<option>Duronto Express</option>
</select><br>
<input type="number" name="seats" class="form-control" placeholder="Seats"><br>
<button class="btn btn-primary">Book Ticket</button>
</form>

<h3 class="mt-5">My Bookings</h3>
<table class="table table-bordered">
<tr><th>Train</th><th>Seats</th><th>PNR</th></tr>
{% for b in bookings %}
<tr>
<td>{{b[2]}}</td>
<td>{{b[3]}}</td>
<td>{{b[4]}}</td>
</tr>
{% endfor %}
</table>

<a href="/logout" class="btn btn-danger">Logout</a>
</div>
</body>
</html>
